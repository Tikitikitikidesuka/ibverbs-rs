[package]
name = "infinibuilder"
version = "0.1.0"
edition = "2024"

[dependencies]
ibverbs = { git = "https://github.com/jonhoo/rust-ibverbs.git", rev = "fa92aa3", features = ["serde"] }
thiserror = "2.0.12"
serde_json = "1.0.141"

[[bin]]
name = "loopback"
path = "bin/loopback.rs"

[[bin]]
name = "test"
path = "bin/test.rs"

[[bin]]
name = "manual_endpoint"
path = "bin/manual_endpoint.rs"

[[bin]]
name = "socket_connector"
path = "bin/socket_connector.rs"
