stages:
  - check
  - test
  - pages

variables:
  RUST_IMAGE: "gitlab-registry.cern.ch/mhermoso/pcie40-rs:latest"
  RUST_BACKTRACE: 1

# Common configuration to be extended
.rust_template:
  tags: [online_network, docker]
  image: ${RUST_IMAGE}

# Cache only compiled artifacts
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - target/

# Syntax and code quality check
rust-check:
  extends: .rust_template
  stage: check
  script:
    - cargo check --all-features
    - cargo clippy --all-features --no-deps # -- -D warnings
    - cargo fmt -- --check

# Run tests
rust-test:
  extends: .rust_template
  stage: test
  script:
    - cargo test --all

# Build and publish documentation to GitLab Pages
pages:
  extends: .rust_template
  stage: pages
  script:
    - cargo doc --no-deps --all-features
    - mkdir -p public
    - cp -r target/doc/* public/
    - echo '<meta http-equiv="refresh" content="0; url=pcie40-rs/index.html">' > public/index.html
  artifacts:
    paths:
      - public
  only:
    - main