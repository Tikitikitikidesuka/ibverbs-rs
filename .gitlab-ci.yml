stages:
  - build-image
  - run-jobs

variables:
  RUST_BACKTRACE: 1
  DOCKERFILE: "$CI_PROJECT_DIR/Dockerfile"
  RUST_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  #HARDWARE_TESTS_DEVICE_NAME: "tdtel202_0"

build:
  stage: build-image
  image:
    name: gitlab-registry.cern.ch/ci-tools/docker-image-builder
    entrypoint: [ "" ]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $DOCKERFILE \
      --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
      --destination $CI_REGISTRY_IMAGE:latest
  only:
    - master

.rust_template:
  tags: [ online_network, docker ]
  image: ${RUST_IMAGE}
  dependencies:
    - build

rust-check:
  extends: .rust_template
  stage: run-jobs
  script:
    - cargo check --all-features --offline
    - cargo clippy --all-features --no-deps --offline
    - cargo fmt -- --check

rust-test:
  extends: .rust_template
  stage: run-jobs
  script:
    - cargo test --all --all-features --offline

pages:
  extends: .rust_template
  stage: run-jobs
  script:
    - cargo doc --workspace --no-deps --all-features --offline
    - mkdir -p public
    - cp -r target/doc/* public/
    - echo '<meta http-equiv="refresh" content="0; url=rusteb">' > public/index.html
  artifacts:
    paths:
      - public

