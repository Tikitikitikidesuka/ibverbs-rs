[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.dependencies]
thiserror = "2.0"
bytemuck = { version = "1.24", features = ["derive"] }
typed-builder = "0.23"

[package]
name = "pcie40-rs"
version = "0.1.0"
edition = "2024"
description = "Rust bindings for the PCIe40 drivers"

[dependencies]
thiserror.workspace = true
pcie40 = { path = "crates/pcie40" }
alignment-utils = { path = "crates/alignment-utils" }
circular-buffer = { path = "crates/circular-buffer" }
shared-memory-buffer = { path = "crates/shared-memory-buffer" }
multi-fragment-packet = { path = "crates/multi-fragment-packet", features = [
    "pcie40-io",
    "shmem-io",
] }
# Setting feature "release_max_level_info" makes sure compiled release binaries
# do not contain traces on levels higher than Info. Its important for performance.
tracing = { version = "0.1.41" }                                       #, features = ["release_max_level_info"] }
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

[[bin]]
name = "pcie40_to_shmem_reader"
path = "bin/pcie40_to_shmem_reader.rs"

[[bin]]
name = "pcie40_to_shmem_receiver"
path = "bin/pcie40_to_shmem_receiver.rs"

[[bin]]
name = "mock_pcie40_to_shmem_reader"
path = "bin/mock_pcie40_to_shmem_reader.rs"
