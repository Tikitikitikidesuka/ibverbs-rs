[package]
name = "pcie40-rs"
version = "0.1.0"
edition = "2024"
description = "Rust bindings for the PCIe40 drivers"

[dependencies]
thiserror = "2.0.12"
log = "0.4.26"
env_logger = "0.11.6"
libc = "0.2.170"
nix = { version = "0.29.0", features = ["fs"] }

[build-dependencies]
bindgen = { version = "0.71.1", optional = true }

[features]
pcie40 = ["bindgen"]
pcie40-hardware-tests = ["pcie40"]
multi-fragment-packet = []
shared-memory = []
mock-reader = []
utils = []

[[bin]]
name = "pcie40_reader_benchmark"
path = "bin/pcie40_reader_benchmark.rs"

[[example]]
name = "byte_reading_example"
path = "examples/byte_reading_example.rs"

[[example]]
name = "example_readable"
path = "examples/example_readable.rs"

[[example]]
name = "typed_reading_example"
path = "examples/typed_reading_example.rs"
required-features = ["utils"]

[[example]]
name = "temp_example"
path = "examples/temp_example.rs"
required-features = ["pcie40", "multi-fragment-packet"]
