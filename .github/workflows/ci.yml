name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  ci-build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tikitikitikidesuka/ibverbs-rs
          tags: |
            type=raw,value=dev
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  rust-check:
    name: Check, Clippy, Fmt
    runs-on: ubuntu-latest
    needs: ci-build

    container:
      image: ghcr.io/tikitikitikidesuka/ibverbs-rs:${{ needs.ci-build.outputs.image_tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt -- --check
      - run: cargo check --all-features
      - run: cargo clippy --all-features --no-deps

  rust-test:
    name: Test
    runs-on: ubuntu-latest
    needs: ci-build

    container:
      image: ghcr.io/tikitikitikidesuka/ibverbs-rs:${{ needs.ci-build.outputs.image_tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: cargo test --all-features

  docs-build:
    name: Build docs
    runs-on: ubuntu-latest
    needs: [rust-test, ci-build]

    container:
      image: ghcr.io/tikitikitikidesuka/ibverbs-rs:${{ needs.ci-build.outputs.image_tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - run: cargo doc --no-deps --all-features
      - run: echo '<meta http-equiv="refresh" content="0; url=ibverbs_rs/index.html">' > /opt/cargo-target/doc/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: /opt/cargo-target/doc

  docs-deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: docs-build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
