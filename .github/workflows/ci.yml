name: CI

on:
  push:
  pull_request:

jobs:
  rust-check:
    name: Check, Clippy, Fmt
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tikitikitikidesuka/rusteb:dev
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - run: cargo check --all-features
      - run: cargo clippy --all-features --no-deps
      - run: cargo fmt -- --check

  rust-test:
    name: Test
    runs-on: ubuntu-latest
    needs: rust-check
    container:
      image: ghcr.io/tikitikitikidesuka/rusteb:dev
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - run: cargo test --all --all-features

  docs-build:
    name: Build docs
    runs-on: ubuntu-latest
    needs: rust-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    container:
      image: ghcr.io/tikitikitikidesuka/rusteb:dev
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - run: cargo doc --workspace --no-deps --all-features
      - run: echo '<meta http-equiv="refresh" content="0; url=rusteb">' > target/doc/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  docs-deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: docs-build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
