name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: rusteb-env:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cargo Check
        run: docker run --rm -v ${{ github.workspace }}:/app rusteb-env bash -c "cargo check --all-features"

      - name: Cargo Clippy
        run: docker run --rm -v ${{ github.workspace }}:/app rusteb-env bash -c "cargo clippy --all-features --no-deps"

      - name: Cargo Fmt
        run: docker run --rm -v ${{ github.workspace }}:/app rusteb-env bash -c "cargo fmt -- --check"

      - name: Cargo Test
        run: docker run --rm -v ${{ github.workspace }}:/app rusteb-env bash -c "cargo test --all --all-features"

      - name: Build Docs
        if: github.ref == 'refs/heads/master'
        run: |
          docker run --rm -v ${{ github.workspace }}:/app rusteb-env bash -c "\
            cargo doc --workspace --no-deps --all-features && \
            mkdir -p public && \
            cp -r target/doc/* public/ && \
            echo '<meta http-equiv=\"refresh\" content=\"0; url=rusteb\">' > public/index.html && \
            chown -R $(id -u):$(id -g) public target"

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-pages:
    needs: run-jobs
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
