name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache Rust dependencies and build artifacts
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      # Enable advanced Docker builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Docker image with persistent cache
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: rusteb-env:latest
          cache-from: type=gha,scope=rusteb
          cache-to: type=gha,mode=max,scope=rusteb

      # Shared docker run command
      - name: Cargo Check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v ~/.cargo:/root/.cargo \
            -v ${{ github.workspace }}/target:/app/target \
            rusteb-env \
            bash -c "cargo check --all-features"

      - name: Cargo Clippy
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v ~/.cargo:/root/.cargo \
            -v ${{ github.workspace }}/target:/app/target \
            rusteb-env \
            bash -c "cargo clippy --all-features --no-deps -- -D warnings"

      - name: Cargo Fmt
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v ~/.cargo:/root/.cargo \
            -v ${{ github.workspace }}/target:/app/target \
            rusteb-env \
            bash -c "cargo fmt -- --check"

      - name: Cargo Test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v ~/.cargo:/root/.cargo \
            -v ${{ github.workspace }}/target:/app/target \
            rusteb-env \
            bash -c "cargo test --workspace --all-features"

      - name: Build Docs
        if: github.ref == 'refs/heads/master'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v ~/.cargo:/root/.cargo \
            -v ${{ github.workspace }}/target:/app/target \
            rusteb-env \
            bash -c "
              cargo doc --workspace --no-deps --all-features &&
              mkdir -p public &&
              cp -r target/doc/* public/ &&
              echo '<meta http-equiv=\"refresh\" content=\"0; url=rusteb\">' > public/index.html
            "

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-pages:
    needs: run-jobs
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
